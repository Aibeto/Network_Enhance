name: CI Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get timestamp
        id: timestamp
        run: echo "value=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

      - name: Package artifact
        run: |
          mkdir -p artifact
          zip -r "artifact/Network_Enhance_ci_${{ steps.timestamp.outputs.value }}.zip" \
            . -x ".git/*" ".github/*" ".gitignore" "*.zip" "*.tar.gz" "*.7z"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Network_Enhance_ci_${{ steps.timestamp.outputs.value }}
          path: artifact/Network_Enhance_ci_${{ steps.timestamp.outputs.value }}.zip
